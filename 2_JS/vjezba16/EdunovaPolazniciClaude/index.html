<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edunova - Frontend Developer Polaznici</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-gradient"></div>
    
    <header class="header">
        <div class="container">
            <h1 class="logo">Edunova <span class="highlight">FD1</span></h1>
        </div>
    </header>

    <main class="container">
       

        <div class="students-grid" id="studentsGrid">
            <!-- Student cards will be generated by JavaScript -->
        </div>
    </main>

    <!-- Lightbox Gallery -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">&times;</button>
        <button class="lightbox-prev" id="lightboxPrev">&#8249;</button>
        <button class="lightbox-next" id="lightboxNext">&#8250;</button>
        <div class="lightbox-content">
            <img src="" alt="" id="lightboxImage">
            <div class="lightbox-info">
                <h3 id="lightboxName"></h3>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Edunova. Sva prava pridržana.</p>
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
